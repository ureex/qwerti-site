<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qwerti — Swap & Bridge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#050810;
      --surface:#0c1120;
      --border:rgba(99,210,255,0.13);
      --glow:#63d2ff;
      --glow2:#a06cff;
      --accent:#00f5c4;
      --text:#e8f4ff;
      --muted:#6b8caa;
      --card:rgba(12,17,32,0.85);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top:0;
      left:0;
      right:0;
      display:flex;
      justify-content:space-between;
      padding:1.2rem 2rem;
      background:rgba(5,8,16,.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      z-index:100;
    }

    .logo {
      font-weight:800;
      background:linear-gradient(90deg,var(--glow),var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    #hero {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:120px 20px;
    }

    h1 {
      font-size:clamp(2.5rem,6vw,5rem);
      font-weight:800;
    }

    .section-inner {
      max-width:1100px;
      margin:0 auto;
      padding:6rem 1.5rem;
    }

    .widget-layout {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4rem;
      align-items:center;
    }

    @media(max-width:800px){
      .widget-layout { grid-template-columns:1fr; }
    }

    .widget-frame {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:2rem;
      display:flex;
      justify-content:center;
    }

    /* 🔥 SWAP CARD (NEW) */
    .swap-card{
      width:100%;
      max-width:420px;
      padding:20px;
      border-radius:16px;
      background:#0c1120;
      border:1px solid rgba(99,210,255,.2);
      box-shadow:0 0 30px rgba(99,210,255,.1);
    }

    .token-box{
      background:#050810;
      padding:14px;
      border-radius:10px;
      margin-bottom:12px;
    }

    .token-label{
      font-size:.75rem;
      color:#6b8caa;
    }

    .token-name{
      font-weight:700;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      background:#050810;
      color:white;
      margin:15px 0;
    }

    .swap-btn{
      display:block;
      text-align:center;
      padding:14px;
      border-radius:12px;
      font-weight:800;
      text-decoration:none;
      color:#050810;
      background:linear-gradient(135deg,#63d2ff,#a06cff);
      box-shadow:0 0 25px rgba(99,210,255,.4);
    }

  </style>
</head>

<body>

<nav>
  <div class="logo">Qwerti.ai</div>
  <a href="#swap">Swap</a>
</nav>

<section id="hero">
  <h1>Swap & Bridge</h1>
  <p style="color:#6b8caa;">Buy your token instantly</p>
</section>

<!-- 🔥 FULL ORIGINAL SECTION WITH FIX -->
<section id="swap">
  <div class="section-inner">

    <div class="widget-layout">

      <!-- LEFT SIDE -->
      <div>
        <h2>Trade tokens directly here</h2>
        <p style="color:#6b8caa;margin-top:10px;">
          Fast, simple and secure swapping experience.
        </p>
      </div>

      <!-- RIGHT SIDE (REPLACED WIDGET) -->
      <div class="widget-frame">

        <div class="swap-card">

          <div class="token-box">
            <div class="token-label">From</div>
            <div class="token-name">SOL SOL</div>
          </div>

          <div style="text-align:center;margin:10px 0;">↓</div>

          <div class="token-box">
            <div class="token-label">To</div>
            <div class="token-name">BASE SOL</div>
          </div>

          <input type="number" placeholder="Enter amount">

          <a 
            href="https://app.qwerti.ai/buy/0x311935cd80b76769bf2ecc9d8ab7635b2139cf82/8453?campaign=sol-8453-36545"
            target="_blank"
            class="swap-btn"
          >
            🚀 Swap Now
          </a>

        </div>

      </div>

    </div>

  </div>
</section>

</body>
</html>
