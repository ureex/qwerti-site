<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qwerti — Swap & Bridge</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  background:#050810;
  color:#e8f4ff;
  font-family:'Syne',sans-serif;
  margin:0;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
}
.logo {font-weight:800;}

/* HERO */
#hero {
  text-align:center;
  padding:100px 20px;
}

/* WIDGET CARD */
.widget-frame {
  max-width:700px;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(12,17,32,0.85);
  border:1px solid rgba(99,210,255,0.2);
  box-shadow:0 0 40px rgba(99,210,255,.1);
}

/* BUY BUTTON */
.buy-btn {
  display:block;
  text-align:center;
  margin-bottom:20px;
  padding:14px;
  border-radius:10px;
  font-weight:800;
  text-decoration:none;
  color:#050810;
  background:linear-gradient(135deg,#63d2ff,#a06cff);
  box-shadow:0 0 20px rgba(99,210,255,.4);
  transition:.2s;
}
.buy-btn:hover {
  transform:translateY(-2px);
  opacity:.9;
}

/* iframe */
.qwerti-iframe {
  width:100%;
  height:600px;
  border:none;
  border-radius:12px;
}

/* footer */
footer {
  text-align:center;
  padding:40px;
  color:#6b8caa;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Qwerti.ai</div>
  <div><a href="#swap" style="color:#63d2ff;">Swap</a></div>
</nav>

<section id="hero">
  <h1>Swap & Bridge</h1>
  <p>Fast cross-chain swaps powered by Qwerti</p>
</section>

<section id="swap">
  <div class="widget-frame">

    <!-- 🔥 YOUR REFERRAL BUTTON -->
    <a 
      href="https://app.qwerti.ai/buy/0x311935cd80b76769bf2ecc9d8ab7635b2139cf82/8453?campaign=sol-8453-36545"
      target="_blank"
      class="buy-btn"
    >
      🚀 Buy / Sell This Token
    </a>

    <!-- 👇 EMBED FOR UI -->
    <iframe 
      class="qwerti-iframe"
      src="https://app.qwerti.ai"
    ></iframe>

  </div>
</section>

<footer>
Qwerti.ai — Swap & Bridge
</footer>

</body>
</html>
