<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qwerti — Swap & Bridge</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#050810;
  --surface:#0c1120;
  --border:rgba(99,210,255,0.13);
  --glow:#63d2ff;
  --glow2:#a06cff;
  --accent:#00f5c4;
  --text:#e8f4ff;
  --muted:#6b8caa;
  --card:rgba(12,17,32,0.85);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Widget container */
.widget-frame {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  max-width: 700px;
  margin: 60px auto;
}

/* iframe fix */
.qwerti-iframe {
  width: 100%;
  height: 600px;
  border: none;
  border-radius: 12px;
}

/* simple layout */
nav {
  display:flex;
  justify-content:space-between;
  padding:1rem 2rem;
}
.logo {font-weight:800;}
.nav-links {display:flex;gap:1rem;}

#hero {
  text-align:center;
  padding:120px 20px;
}

footer {
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Qwerti.ai</div>
  <div class="nav-links">
    <a href="#swap">Swap</a>
  </div>
</nav>

<section id="hero">
  <h1>Swap & Bridge</h1>
  <p>Fast cross-chain swaps powered by Qwerti</p>
</section>

<!-- ✅ WORKING WIDGET SECTION -->
<section id="swap">
  <div class="widget-frame">
    
    <iframe 
      class="qwerti-iframe"
      src="https://app.qwerti.ai/buy/0x311935cd80b76769bf2ecc9d8ab7635b2139cf82/8453?campaign=sol-8453-36545"
      allow="clipboard-write"
    ></iframe>

  </div>
</section>

<footer>
  Qwerti.ai — Swap & Bridge
</footer>

</body>
</html>
