<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwerti — Swap</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Syne',sans-serif;
  background:#050810;
  color:#e8f4ff;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
}
.logo {font-weight:800;}
nav a {color:#63d2ff;text-decoration:none;}

/* HERO */
#hero {
  text-align:center;
  padding:80px 20px 20px;
}
#hero h1 {font-size:2.5rem;margin-bottom:10px;}
#hero p {color:#6b8caa;}

/* SWAP CARD */
.swap-card {
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border-radius:18px;
  background:rgba(12,17,32,0.9);
  border:1px solid rgba(99,210,255,.2);
  box-shadow:0 0 40px rgba(99,210,255,.08);
}

/* TOKEN BOX */
.token-box {
  background:#050810;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
}

.token-label {
  font-size:.75rem;
  color:#6b8caa;
}

.token-name {
  font-weight:700;
  font-size:1.1rem;
}

/* INPUT */
input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#050810;
  color:white;
  margin:15px 0;
  font-size:1rem;
}

/* BUTTON */
.swap-btn {
  display:block;
  text-align:center;
  padding:14px;
  border-radius:12px;
  font-weight:800;
  text-decoration:none;
  color:#050810;
  background:linear-gradient(135deg,#63d2ff,#a06cff);
  box-shadow:0 0 20px rgba(99,210,255,.3);
  transition:.2s;
}
.swap-btn:hover {
  transform:translateY(-2px);
  opacity:.9;
}

/* FOOTER */
footer {
  text-align:center;
  padding:40px;
  color:#6b8caa;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Qwerti.ai</div>
  <a href="#swap">Swap</a>
</nav>

<section id="hero">
  <h1>Swap & Bridge</h1>
  <p>Buy your token instantly using Qwerti</p>
</section>

<!-- 🔥 SWAP UI -->
<section id="swap">
  <div class="swap-card">

    <div class="token-box">
      <div class="token-label">From</div>
      <div class="token-name">ETH</div>
    </div>

    <div style="text-align:center;margin:10px 0;">↓</div>

    <div class="token-box">
      <div class="token-label">To</div>
      <div class="token-name">Your Token</div>
    </div>

    <input type="number" placeholder="Enter amount">

    <!-- 🔥 REFERRAL LINK -->
    <a 
      href="https://app.qwerti.ai/buy/0x311935cd80b76769bf2ecc9d8ab7635b2139cf82/8453?campaign=sol-8453-36545"
      target="_blank"
      class="swap-btn"
    >
      🚀 Swap Now
    </a>

  </div>
</section>

<footer>
Qwerti.ai — Swap & Bridge
</footer>

</body>
</html>
